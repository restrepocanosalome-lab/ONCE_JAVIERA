<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tarjeta de Perfil</title>
<style>


* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #f3f4f6;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}


.card {
  background: white;
  width: 320px;
  border-radius: 15px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}


.avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
}


.name {
  text-align: center;
}

.name h2 {
  font-size: 20px;
}

.name p {
  color: rgb(24, 213, 226);
}


.bio {
  text-align: center;
  font-size: 14px;
  color: #c57daa;
}

.stats {
  width: 100%;
  display: flex;
  justify-content: space-between;
  text-align: center;
}

.stat {
  flex: 1;
}

.stat h3 {
  font-size: 16px;
}

.stat p {
  font-size: 12px;
  color: rgb(37, 198, 219);
}


.actions {
  width: 100%;
  display: flex;
  gap: 10px;
}

.actions button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.follow {
  background: #a987e9;
  color: white;
}

.message {
  background: #e5e7eb;
}


.projects {
  width: 100%;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

.projects img {
  width: 90px;
  height: 90px;
  border-radius: 10px;
  object-fit: cover;
}

</style>
</head>
<body>

<div class="card">

  <img src="https://picsum.photos/150/150" class="avatar">

  <div class="name">
    <h2>Salomé Restrepo</h2>
    <p>@salo.RC</p>
  </div>

  <div class="bio">
    Soy estudiante de software, me gusta patinar y vivo en Colombia.
  </div>

  <div class="stats">
    <div class="stat">
      <h3>2</h3>
      <p>Proyectos</p>
    </div>
    <div class="stat">
      <h3>120</h3>
      <p>Seguidores</p>
    </div>
    <div class="stat">
      <h3>80</h3>
      <p>Siguiendo</p>
    </div>
  </div>

  <div class="actions">
    <button class="follow">Seguir</button>
    <button class="message">Mensaje</button>
  </div>

  <div class="projects">
    <img src="https://picsum.photos/100/100?1">
    <img src="https://picsum.photos/100/100?2">
    <img src="https://picsum.photos/100/100?3">
  </div>

</div>

</body>
</html>
